<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Map — AbujaFix</title>
  <meta name="description" content="Live map of all reported infrastructure problems across Abuja FCT. Bad roads, blocked drains, broken streetlights, abandoned projects." />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75; --green-light: #EAF3DE; --green-dark: #27500A; --green-mid: #3B6D11;
      --red: #E24B4A; --amber: #BA7517; --blue: #378ADD; --grey: #888780;
      --border: #E5E4DF; --bg: #FAFAF8; --bg2: #F4F3EF;
      --text: #1A1A18; --text2: #6B6B68; --radius: 10px;
    }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    a { text-decoration: none; color: inherit; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
    .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
    .logo span { color: var(--green); }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--text2); }
    .nav-links a.active { color: var(--green); font-weight: 500; }
    .nav-cta { background: var(--green); color: #fff !important; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; }

    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 0.5px solid var(--border); }
    .stat { padding: 1rem 0.8rem; text-align: center; border-right: 0.5px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-n { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    .stat-n.road { color: var(--red); }
    .stat-n.drain { color: var(--blue); }
    .stat-n.light { color: var(--amber); }
    .stat-n.other { color: var(--grey); }
    .stat-l { font-size: 11px; color: var(--text2); margin-top: 2px; }

    .filter-bar { padding: 0.7rem 1.2rem; border-bottom: 0.5px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; background: var(--bg); position: sticky; top: 57px; z-index: 999; }
    .filter-label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .filt { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border); background: var(--bg); color: var(--text2); font-family: inherit; }
    .filt.active { border-color: transparent; }
    .filt.all.active { background: var(--green); color: #fff; }
    .filt.road.active { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
    .filt.drain.active { background: #E6F1FB; color: #185FA5; border-color: #85B7EB; }
    .filt.light.active { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
    .filt.abandon.active { background: #F1EFE8; color: #5F5E5A; border-color: #B4B2A9; }

    .map-layout { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 180px); min-height: 400px; }
    @media (max-width: 640px) { .map-layout { grid-template-columns: 1fr; grid-template-rows: 60vw 1fr; } }

    #map { width: 100%; height: 100%; z-index: 1; }

    .sidebar { border-left: 0.5px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
    .sidebar-header { padding: 0.9rem 1rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .sidebar-title { font-size: 13px; font-weight: 600; }
    .sidebar-count { font-size: 11px; color: var(--text2); background: var(--bg2); padding: 2px 8px; border-radius: 20px; }

    .report-card { padding: 0.9rem 1rem; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .report-card:hover { background: var(--bg2); }
    .rc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .rc-cat { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .rc-cat.road { background: #FCEBEB; color: #A32D2D; }
    .rc-cat.drain { background: #E6F1FB; color: #185FA5; }
    .rc-cat.light { background: #FAEEDA; color: #854F0B; }
    .rc-cat.abandon { background: #F1EFE8; color: #5F5E5A; }
    .rc-time { font-size: 11px; color: var(--text2); }
    .rc-area { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .rc-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
    .rc-sev { display: flex; align-items: center; gap: 4px; margin-top: 5px; }
    .sev-dot { width: 6px; height: 6px; border-radius: 50%; }
    .sev-dot.high { background: var(--red); }
    .sev-dot.med { background: var(--amber); }
    .sev-dot.low { background: var(--green); }
    .sev-text { font-size: 11px; color: var(--text2); }

    .map-footer { padding: 0.8rem 1.2rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: var(--bg); }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; }
    .report-btn { background: var(--green); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; }
    .report-btn:hover { background: #179063; }

    /* Leaflet popup custom style */
    .af-popup { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; }
    .af-popup strong { font-size: 14px; font-weight: 600; display: block; margin-bottom: 3px; }
    .af-popup .pop-cat { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
    .af-popup .pop-desc { color: #6B6B68; line-height: 1.5; margin-bottom: 5px; }
    .af-popup .pop-time { font-size: 11px; color: #999; }
  </style>
</head>
<body>

  <nav>
    <div class="logo"><a href="index.html">Abuja<span>Fix</span></a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="map.html" class="active">Live map</a>
      <a href="report.html" class="nav-cta"><i class="ti ti-plus"></i> Report</a>
    </div>
  </nav>

  <div class="stats-bar">
    <div class="stat"><div class="stat-n road" id="cnt-road">24</div><div class="stat-l">Bad roads</div></div>
    <div class="stat"><div class="stat-n drain" id="cnt-drain">17</div><div class="stat-l">Blocked drains</div></div>
    <div class="stat"><div class="stat-n light" id="cnt-light">11</div><div class="stat-l">Broken lights</div></div>
    <div class="stat"><div class="stat-n other" id="cnt-other">9</div><div class="stat-l">Other issues</div></div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filt all active" onclick="filterReports('all', this)">All (61)</button>
    <button class="filt road" onclick="filterReports('road', this)">Bad roads</button>
    <button class="filt drain" onclick="filterReports('drain', this)">Blocked drains</button>
    <button class="filt light" onclick="filterReports('light', this)">Broken lights</button>
    <button class="filt abandon" onclick="filterReports('abandon', this)">Abandoned</button>
  </div>

  <div class="map-layout">
    <div id="map"></div>
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Recent reports</span>
        <span class="sidebar-count" id="feed-count">61 total</span>
      </div>
      <div id="report-feed"></div>
    </div>
  </div>

  <div class="map-footer">
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Bad road</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div>Blocked drain</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div>Broken light</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--grey)"></div>Abandoned</div>
    </div>
    <button class="report-btn" onclick="window.location.href='report.html'"><i class="ti ti-plus"></i> Add report</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://pahcyenqouciolmsoaiw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhaGN5ZW5xb3VjaW9sbXNvYWl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MzUzNTgsImV4cCI6MjA5NDQxMTM1OH0.YXCmkUYbLd8kuiWMaBFl-uuKLipYT0mjg7AglQtIaVA';

    const typeConfig = {
      road:    { color: '#E24B4A', label: 'Bad road' },
      drain:   { color: '#378ADD', label: 'Blocked drain' },
      light:   { color: '#BA7517', label: 'Broken light' },
      abandon: { color: '#888780', label: 'Abandoned project' },
      other:   { color: '#888780', label: 'Other' },
    };

    const map = L.map('map', { zoomControl: true }).setView([9.058, 7.450], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    let allReports = [];
    let markers = [];
    let currentFilter = 'all';

    function makeIcon(color) {
      return L.divIcon({
        className: '',
        html: `<div style="width:22px;height:22px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.35);cursor:pointer;"></div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11],
        popupAnchor: [0, -14],
      });
    }

    function timeAgo(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + ' hrs ago';
      return Math.floor(diff / 86400) + ' days ago';
    }

    function renderMarkers(reports) {
      markers.forEach(({ marker }) => map.removeLayer(marker));
      markers = [];
      reports.forEach(r => {
        if (!r.lat || !r.lng) return;
        const cfg = typeConfig[r.type] || typeConfig.other;
        const marker = L.marker([r.lat, r.lng], { icon: makeIcon(cfg.color) });
        const desc = (r.description || 'No description provided').replace(/[<>]/g, '');
        const shortId = r.id ? r.id.slice(0,8).toUpperCase() : '--------';
        marker.bindPopup(
          '<div style="font-family:Inter,system-ui,sans-serif;font-size:13px;min-width:180px;">' +
          '<div style="font-size:15px;font-weight:600;margin-bottom:5px;color:#1A1A18;">' + r.area + '</div>' +
          '<span style="background:' + cfg.color + '22;color:' + cfg.color + ';font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px;">' + cfg.label + '</span>' +
          '<div style="color:#6B6B68;line-height:1.5;margin-bottom:7px;font-size:12px;">' + desc + '</div>' +
          '<div style="font-size:11px;color:#999;">Reported ' + timeAgo(r.created_at) + ' · #' + shortId + '</div>' +
          '</div>',
          { maxWidth: 240 }
        );
        marker.addTo(map);
        markers.push({ marker, type: r.type });
      });
    }

    function buildFeed(reports) {
      const feed = document.getElementById('report-feed');
      document.getElementById('feed-count').textContent = reports.length + ' total';
      if (reports.length === 0) {
        feed.innerHTML = '<div style="padding:2rem 1rem;text-align:center;font-size:13px;color:var(--text2);">No reports yet in this category.<br>Be the first to report!</div>';
        return;
      }
      feed.innerHTML = reports.map(r => {
        const cfg = typeConfig[r.type] || typeConfig.other;
        const sevLabel = { high: 'Severe', med: 'Moderate', low: 'Minor' }[r.severity] || 'Moderate';
        return `
          <div class="report-card" onclick="flyTo(${r.lat},${r.lng})">
            <div class="rc-top">
              <span class="rc-cat ${r.type}">${cfg.label}</span>
              <span class="rc-time">${timeAgo(r.created_at)}</span>
            </div>
            <div class="rc-area">${r.area}</div>
            <div class="rc-desc">${r.description || 'No description'}</div>
            <div class="rc-sev">
              <div class="sev-dot ${r.severity || 'med'}"></div>
              <span class="sev-text">${sevLabel}</span>
            </div>
          </div>`;
      }).join('');
    }

    function updateStats(reports) {
      document.getElementById('cnt-road').textContent  = reports.filter(r => r.type === 'road').length;
      document.getElementById('cnt-drain').textContent = reports.filter(r => r.type === 'drain').length;
      document.getElementById('cnt-light').textContent = reports.filter(r => r.type === 'light').length;
      document.getElementById('cnt-other').textContent = reports.filter(r => !['road','drain','light'].includes(r.type)).length;
    }

    function flyTo(lat, lng) {
      if (lat && lng) map.flyTo([lat, lng], 15, { duration: 0.8 });
    }

    function filterReports(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.filt').forEach(f => f.classList.remove('active'));
      btn.classList.add('active');
      const filtered = type === 'all' ? allReports : allReports.filter(r => r.type === type);
      renderMarkers(filtered);
      buildFeed(filtered);
    }

    async function loadReports() {
      const feed = document.getElementById('report-feed');
      feed.innerHTML = '<div style="padding:2rem 1rem;text-align:center;font-size:13px;color:var(--text2);">Loading reports...</div>';
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/reports?select=*&order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        if (!res.ok) throw new Error('Failed to load');
        allReports = await res.json();
        updateStats(allReports);
        renderMarkers(allReports);
        buildFeed(allReports);
      } catch (err) {
        feed.innerHTML = '<div style="padding:2rem 1rem;text-align:center;font-size:13px;color:var(--text2);">Could not load reports. Please refresh.</div>';
      }
    }

    loadReports();
    // Auto-refresh every 30 seconds to show new reports
    setInterval(loadReports, 30000);
  </script>
</body>
</html>
